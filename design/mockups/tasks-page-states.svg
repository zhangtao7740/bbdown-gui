<svg width="1800" height="1120" viewBox="0 0 1800 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>.panel{fill:#fff;stroke:#D8E0EA}.soft{fill:#F7F9FC}.text{fill:#101828;font-family:'Microsoft YaHei UI','Segoe UI',Arial,sans-serif}.muted{fill:#667085;font-family:'Microsoft YaHei UI','Segoe UI',Arial,sans-serif}.blue{fill:#0F6CBD}.green{fill:#1FA463}.red{fill:#D13438}.line{stroke:#D8E0EA}.mono{font-family:Consolas,'SFMono-Regular',monospace}</style>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FF5FA2"/><stop offset=".55" stop-color="#7C5CFF"/><stop offset="1" stop-color="#64D2FF"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#315179" flood-opacity=".12"/></filter>
  </defs>
  <rect width="1800" height="1120" fill="#EEF3F9"/>
  <text x="70" y="68" class="text" font-size="34" font-weight="700">队列页设计图</text>
  <text x="70" y="102" class="muted" font-size="18">覆盖：运行中队列、任务日志展开、失败重试、空队列</text>
  <g transform="translate(70 140)" filter="url(#shadow)">
    <rect width="1040" height="850" rx="14" class="panel"/>
    <text x="32" y="48" class="text" font-size="24" font-weight="700">A. 任务队列 / 运行中</text>
    <rect x="32" y="76" width="976" height="58" rx="10" class="soft" stroke="#D8E0EA"/>
    <text x="56" y="112" class="text" font-size="18" font-weight="700">3 个视频组 / 7 个子任务</text>
    <rect x="640" y="90" width="90" height="30" rx="7" fill="#fff" stroke="#D8E0EA"/><text x="685" y="110" text-anchor="middle" class="text" font-size="13">全部暂停</text>
    <rect x="742" y="90" width="90" height="30" rx="7" fill="#fff" stroke="#D8E0EA"/><text x="787" y="110" text-anchor="middle" class="text" font-size="13">重试失败</text>
    <rect x="844" y="90" width="120" height="30" rx="7" fill="#fff" stroke="#D8E0EA"/><text x="904" y="110" text-anchor="middle" class="text" font-size="13">清理已完成</text>
    <g transform="translate(32 166)">
      <rect width="976" height="230" rx="10" class="panel"/><rect x="22" y="24" width="112" height="70" rx="8" fill="url(#cover)"/>
      <text x="154" y="44" class="text" font-size="18" font-weight="700">【官方双语】2024 哔哩哔哩拜年纪</text><text x="154" y="72" class="muted" font-size="14">BV1xx411c7mD · 哔哩哔哩拜年纪 · D:\Downloads\BBDown</text>
      <rect x="154" y="96" width="650" height="12" rx="6" fill="#EAF3FF"/><rect x="154" y="96" width="310" height="12" rx="6" class="blue"/><text x="820" y="106" class="blue text" font-size="14" font-weight="700">下载中 48%</text>
      <path d="M22 124H954" class="line"/><text x="22" y="156" class="text" font-size="14" font-weight="700">完整视频 / P1 开场</text><text x="240" y="156" class="muted" font-size="14">下载中 · 8.2 MB/s · 62%</text>
      <text x="22" y="188" class="text" font-size="14" font-weight="700">字幕 + 弹幕</text><text x="240" y="188" class="green text" font-size="14">已完成</text>
      <rect x="814" y="138" width="42" height="28" rx="7" fill="#fff" stroke="#D8E0EA"/><text x="835" y="157" text-anchor="middle" class="text" font-size="13">暂停</text><rect x="866" y="138" width="42" height="28" rx="7" fill="#fff" stroke="#D8E0EA"/><text x="887" y="157" text-anchor="middle" class="text" font-size="13">目录</text><rect x="918" y="138" width="42" height="28" rx="7" fill="#fff" stroke="#D8E0EA"/><text x="939" y="157" text-anchor="middle" class="text" font-size="13">日志</text>
    </g>
    <g transform="translate(32 420)">
      <rect width="976" height="272" rx="10" class="panel"/><text x="22" y="36" class="text" font-size="18" font-weight="700">日志展开状态</text><text x="22" y="64" class="muted" font-size="14">失败排查时保留最近 100 行，默认折叠</text>
      <rect x="22" y="84" width="932" height="160" rx="8" fill="#101828"/>
      <text x="42" y="114" class="mono" font-size="13" fill="#D0D5DD">22:08:12  bbdown  Parsing video info...</text><text x="42" y="142" class="mono" font-size="13" fill="#D0D5DD">22:08:15  bbdown  Downloading video stream 1080P</text><text x="42" y="170" class="mono" font-size="13" fill="#D0D5DD">22:08:28  ffmpeg  Merging audio and video</text><text x="42" y="198" class="mono" font-size="13" fill="#FDA29B">22:08:31  error   Network timeout, retry 1/3</text><text x="42" y="226" class="mono" font-size="13" fill="#D0D5DD">22:08:36  bbdown  Resume from segment 42</text>
    </g>
    <g transform="translate(32 716)">
      <rect width="976" height="94" rx="10" fill="#FFF7F7" stroke="#F5B5B8"/><text x="22" y="36" class="red text" font-size="17" font-weight="700">失败任务</text><text x="22" y="66" class="text" font-size="14">年度动画混剪 · 错误：登录态失效或清晰度无权限</text>
      <rect x="770" y="30" width="76" height="34" rx="8" class="blue"/><text x="808" y="53" text-anchor="middle" fill="#fff" font-size="14">重试</text><rect x="858" y="30" width="76" height="34" rx="8" fill="#fff" stroke="#D8E0EA"/><text x="896" y="53" text-anchor="middle" class="text" font-size="14">去登录</text>
    </g>
  </g>
  <g transform="translate(1160 140)" filter="url(#shadow)">
    <rect width="570" height="400" rx="14" class="panel"/><text x="28" y="48" class="text" font-size="24" font-weight="700">B. 空队列</text>
    <rect x="110" y="96" width="350" height="220" rx="18" class="soft" stroke="#D8E0EA"/><circle cx="285" cy="166" r="42" fill="#0F6CBD" fill-opacity=".12"/><path d="M270 146H300M270 166H300M270 186H290" stroke="#0F6CBD" stroke-width="8" stroke-linecap="round"/>
    <text x="285" y="248" text-anchor="middle" class="text" font-size="20" font-weight="700">暂无下载任务</text><text x="285" y="280" text-anchor="middle" class="muted" font-size="14">从下载页解析视频并加入队列</text>
